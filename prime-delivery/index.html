<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prime Delivery - Sistema Profissional com Banco de Dados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow-x: hidden; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 50px 50px; animation: moveBg 20s linear infinite; }
        @keyframes moveBg { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        .app-container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; transition: all 0.5s; overflow-y: auto; }
        .login-card { background: rgba(255,255,255,0.98); border-radius: 48px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-header { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #e63946, #ff6b6b); border-radius: 25px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .logo-icon i { font-size: 35px; color: white; }
        .role-selector { display: flex; gap: 12px; margin-bottom: 25px; background: #f1f5f9; padding: 6px; border-radius: 60px; }
        .role-btn { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .role-btn.active { background: linear-gradient(135deg, #e63946, #ff6b6b); color: white; }
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-group input { width: 100%; padding: 14px 20px 14px 48px; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 15px; }
        .input-group input:focus { outline: none; border-color: #e63946; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e63946, #ff6b6b); border: none; border-radius: 40px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .login-btn:hover { transform: translateY(-2px); }
        .switch-auth { text-align: center; margin-top: 20px; color: #e63946; cursor: pointer; font-weight: 600; }
        
        .dashboard-main { display: none; animation: fadeIn 0.5s ease; }
        .dashboard-header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 32px; padding: 20px 32px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 55px; height: 55px; background: linear-gradient(135deg, #e63946, #ff6b6b); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .logout-btn { background: #ef4444; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 28px; padding: 20px; display: flex; align-items: center; gap: 15px; transition: all 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -10px rgba(0,0,0,0.15); }
        .stat-icon { width: 55px; height: 55px; background: linear-gradient(135deg, #fee2e2, #fff0f0); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #e63946; }
        .stat-info h3 { font-size: 28px; font-weight: 800; color: #1e293b; }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 28px; background: rgba(255,255,255,0.2); border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: white; color: #e63946; }
        .tab-content { display: none; background: white; border-radius: 32px; padding: 32px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        .pedidos-grid { display: grid; gap: 16px; max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .pedido-card { background: #f8fafc; border-radius: 24px; padding: 18px; transition: all 0.3s; border: 1px solid #e2e8f0; cursor: pointer; }
        .pedido-card:hover { transform: translateX(5px); border-color: #e63946; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-entregue { background: #d1fae5; color: #065f46; }
        .status-andamento { background: #fee2e2; color: #991b1b; }
        .delete-btn { background: #ef4444; border: none; padding: 6px 12px; border-radius: 20px; color: white; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .form-modern { display: grid; gap: 20px; max-width: 100%; }
        .form-modern input, .form-modern select, .form-modern textarea { padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 20px; font-family: inherit; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 32px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 24px; }
        .clear-btn { background: #64748b; border: none; padding: 10px 20px; border-radius: 30px; color: white; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .chat-container { height: 300px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 20px; padding: 15px; margin-bottom: 15px; background: #f8fafc; }
        .chat-message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .chat-message.sent { background: #e63946; color: white; margin-left: auto; text-align: right; }
        .chat-message.received { background: #e2e8f0; color: #1e293b; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 30px; }
        .avaliacao-stars { display: flex; gap: 5px; margin: 10px 0; }
        .star { font-size: 24px; cursor: pointer; color: #cbd5e1; }
        .star.active { color: #fbbf24; }
        .cardapio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .cardapio-item { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; transition: all 0.3s; cursor: pointer; }
        .cardapio-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .cardapio-img { width: 100%; height: 160px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; color: white; }
        .cardapio-info { padding: 15px; }
        .cardapio-preco { color: #e63946; font-weight: bold; font-size: 18px; margin-top: 8px; }
        .contact-list { max-height: 300px; overflow-y: auto; }
        .contact-item { padding: 12px; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
        .contact-item:hover { background: #f1f5f9; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .api-status { position: fixed; bottom: 10px; right: 10px; background: #10b981; color: white; padding: 5px 10px; border-radius: 20px; font-size: 10px; z-index: 100; }
    </style>
</head>
<body>
<div class="bg-animation"></div>

<div id="loginScreen" class="login-overlay">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon"><i class="fas fa-motorcycle"></i></div>
            <h2>Prime Delivery</h2>
            <p style="color: #64748b;">Sistema com Banco de Dados MySQL</p>
        </div>
        <div class="role-selector">
            <button class="role-btn active" data-role="cliente">👤 Cliente</button>
            <button class="role-btn" data-role="entregador">🛵 Entregador</button>
            <button class="role-btn" data-role="admin">👑 Admin</button>
        </div>
        <div id="loginForm">
            <div class="input-group"><i class="fas fa-envelope"></i><input type="text" id="loginIdentifier" placeholder="Email"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Senha"></div>
            <button class="login-btn" onclick="fazerLogin()"><i class="fas fa-arrow-right"></i> Entrar</button>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regNome" placeholder="Nome completo"></div>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="E-mail"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regSenha" placeholder="Senha"></div>
            <div class="input-group"><i class="fas fa-motorcycle"></i><input type="text" id="regVeiculo" placeholder="Veículo (entregador)" style="display:none;"></div>
            <button class="login-btn" onclick="fazerCadastro()"><i class="fas fa-user-plus"></i> Cadastrar</button>
        </div>
        <div class="switch-auth" onclick="toggleAuthMode()" id="switchText">Não tem conta? Cadastre-se</div>
        <p style="text-align: center; margin-top: 15px; font-size: 11px; color: #94a3b8;">
            📌 Admin: admin@gmail.com / 123456<br>
            📌 Cliente: ana@email.com / 123456<br>
            📌 Entregador: jose@email.com / 123456
        </p>
    </div>
</div>

<div id="dashboardMain" class="dashboard-main">
    <div class="app-container">
        <div class="dashboard-header">
            <div class="user-info"><div class="user-avatar"><i id="userAvatarIcon" class="fas fa-user"></i></div><div><h3 id="userNameDisplay"></h3><p id="userRoleDisplay" style="color: #e63946; font-weight: 600;"></p></div></div>
            <div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button></div>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="nav-tabs" id="navTabs"></div>
        <div id="tabContainer"></div>
    </div>
</div>

<div class="api-status" id="apiStatus">🟢 Conectando ao servidor...</div>

<script>
    // ==================== CONFIGURAÇÃO DA API ====================
    const API_URL = 'api.php';
    
    let currentUser = null;
    let activeModal = null;
    let trackingInterval = null;

    // Cardápio
    const cardapio = {
        "McDonald's": [
            { nome: "Big Mac", descricao: "Dois hambúrgueres, alface, queijo", preco: 32.90, icone: "🍔", tempo: 10 },
            { nome: "McFritas Média", descricao: "Batatas fritas crocantes", preco: 15.90, icone: "🍟", tempo: 5 },
            { nome: "McFlurry", descricao: "Sorvete com calda de chocolate", preco: 14.90, icone: "🍦", tempo: 3 }
        ],
        "Burger King": [
            { nome: "Whopper", descricao: "Hambúrguer grelhado", preco: 34.90, icone: "🍔", tempo: 10 },
            { nome: "Batata Frita", descricao: "Batata média", preco: 14.90, icone: "🍟", tempo: 5 },
            { nome: "Sundae", descricao: "Sorvete com calda", preco: 12.90, icone: "🍦", tempo: 3 }
        ],
        "Pizza Hut": [
            { nome: "Pizza Calabresa", descricao: "Calabresa, cebola", preco: 45.90, icone: "🍕", tempo: 30 },
            { nome: "Pizza Portuguesa", descricao: "Presunto, ovos", preco: 49.90, icone: "🍕", tempo: 30 },
            { nome: "Borda Recheada", descricao: "Catupiry", preco: 8.90, icone: "🧀", tempo: 5 }
        ],
        "Habib's": [
            { nome: "Beirute", descricao: "Sanduíche especial", preco: 25.90, icone: "🥙", tempo: 15 },
            { nome: "Esfirra Carne", descricao: "Esfirra aberta", preco: 6.90, icone: "🥟", tempo: 5 },
            { nome: "Kibe", descricao: "6 unidades", preco: 18.90, icone: "🥙", tempo: 10 }
        ],
        "Gendai": [
            { nome: "Combo Temakeria", descricao: "Temaki + Hot Roll", preco: 45.90, icone: "🍣", tempo: 20 },
            { nome: "Hot Roll 8 pçs", descricao: "Filadélfia", preco: 32.90, icone: "🍱", tempo: 15 },
            { nome: "Sunomono", descricao: "Salada de pepino", preco: 12.90, icone: "🥗", tempo: 5 }
        ]
    };

    // Função para chamar a API
    async function callAPI(action, data = {}) {
        const formData = new FormData();
        for (let key in data) {
            formData.append(key, data[key]);
        }
        
        try {
            const response = await fetch(`${API_URL}?action=${action}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            document.getElementById("apiStatus").innerHTML = "🟢 Conectado ao servidor";
            document.getElementById("apiStatus").style.background = "#10b981";
            return result;
        } catch (error) {
            console.error("Erro na API:", error);
            document.getElementById("apiStatus").innerHTML = "🔴 Erro de conexão - Verifique se o XAMPP está rodando!";
            document.getElementById("apiStatus").style.background = "#ef4444";
            return { success: false, message: "Erro de conexão" };
        }
    }

    async function callAPIGet(action, params = {}) {
        let url = `${API_URL}?action=${action}`;
        for (let key in params) {
            url += `&${key}=${params[key]}`;
        }
        try {
            const response = await fetch(url);
            return await response.json();
        } catch (error) {
            console.error("Erro na API:", error);
            return [];
        }
    }

    // ==================== AUTENTICAÇÃO ====================
    let isLoginMode = true;
    
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("loginForm").style.display = isLoginMode ? "block" : "none";
        document.getElementById("registerForm").style.display = isLoginMode ? "none" : "block";
        document.getElementById("switchText").innerHTML = isLoginMode ? "Não tem conta? Cadastre-se" : "Já tem conta? Faça login";
        const role = document.querySelector(".role-btn.active").dataset.role;
        document.getElementById("regVeiculo").style.display = (!isLoginMode && role === "entregador") ? "block" : "none";
    }

    async function fazerCadastro() {
        const nome = document.getElementById("regNome").value;
        const email = document.getElementById("regEmail").value;
        const senha = document.getElementById("regSenha").value;
        const role = document.querySelector(".role-btn.active").dataset.role;
        const veiculo = document.getElementById("regVeiculo").value;
        
        if (!nome || !email || !senha) { alert("Preencha todos os campos!"); return; }
        
        const data = { nome, email, senha, tipo: role };
        if (role === "entregador") {
            if (!veiculo) { alert("Informe o veículo!"); return; }
            data.veiculo = veiculo;
        }
        
        const result = await callAPI('cadastrar', data);
        if (result.success) {
            alert("Cadastro realizado com sucesso! Faça login.");
            toggleAuthMode();
        } else {
            alert(result.message || "Erro ao cadastrar");
        }
    }

    async function fazerLogin() {
        const identifier = document.getElementById("loginIdentifier").value;
        const senha = document.getElementById("loginPassword").value;
        const role = document.querySelector(".role-btn.active").dataset.role;
        
        if (role === "admin" && identifier === "admin@gmail.com" && senha === "123456") {
            currentUser = { id: 99, nome: "Administrador", role: "admin" };
            entrarNoSistema();
        } else {
            const result = await callAPI('login', { email: identifier, senha, tipo: role });
            if (result.success) {
                currentUser = result.user;
                entrarNoSistema();
            } else {
                alert(result.message || "Credenciais inválidas!");
            }
        }
    }

    function entrarNoSistema() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboardMain").style.display = "block";
        document.getElementById("userNameDisplay").innerText = currentUser.nome;
        document.getElementById("userRoleDisplay").innerHTML = currentUser.role === "cliente" ? "👤 Cliente" : (currentUser.role === "entregador" ? "🛵 Entregador" : "👑 Administrador");
        document.getElementById("userAvatarIcon").className = currentUser.role === "cliente" ? "fas fa-user" : (currentUser.role === "entregador" ? "fas fa-motorcycle" : "fas fa-shield-alt");
        carregarDashboard();
    }

    // ==================== FUNÇÕES DO SISTEMA ====================
    async function carregarDashboard() {
        await atualizarStats();
        renderizarTabs();
    }

    async function atualizarStats() {
        const statsGrid = document.getElementById("statsGrid");
        if (currentUser.role === "admin") {
            const pedidos = await callAPIGet('listar_pedidos');
            const entregadores = await callAPIGet('listar_entregadores');
            const clientes = await callAPIGet('listar_clientes');
            statsGrid.innerHTML = `<div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>${pedidos.length}</h3><p>Total Pedidos</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-truck"></i></div><div class="stat-info"><h3>${entregadores.length}</h3><p>Entregadores</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>${clientes.length}</h3><p>Clientes</p></div></div>`;
        } else if (currentUser.role === "cliente") {
            const pedidos = await callAPIGet('listar_pedidos', { cliente_id: currentUser.id });
            statsGrid.innerHTML = `<div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-info"><h3>${pedidos.length}</h3><p>Meus Pedidos</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>${pedidos.filter(p=>p.status==="entregue").length}</h3><p>Entregues</p></div></div>`;
        } else {
            const pedidos = await callAPIGet('listar_pedidos', { entregador_id: currentUser.id });
            statsGrid.innerHTML = `<div class="stat-card"><div class="stat-icon"><i class="fas fa-truck"></i></div><div class="stat-info"><h3>${pedidos.length}</h3><p>Minhas Entregas</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-info"><h3>${currentUser.avaliacao || 5}</h3><p>Avaliação</p></div></div>`;
        }
    }

    async function criarPedido(produto, quantidade, restaurante, metodo, endereco, preco) {
        const taxa = { "McDonald's":8.5, "Burger King":7.5, "Pizza Hut":10, "Habib's":6, "Gendai":9 }[restaurante];
        const total = (preco * quantidade) + taxa;
        
        const result = await callAPI('criar_pedido', {
            cliente_id: currentUser.id,
            restaurante,
            produto,
            quantidade,
            valor: total,
            endereco,
            metodo
        });
        
        if (result.success) {
            alert(`Pedido #${result.id} criado com sucesso!`);
            
            // Simular ciclo do pedido
            setTimeout(async () => {
                await callAPI('atualizar_status', { pedido_id: result.id, status: 'em_preparo', status_text: '👨‍🍳 Em preparo' });
                renderizarTabs();
            }, 5000);
            
            setTimeout(async () => {
                await callAPI('atualizar_status', { pedido_id: result.id, status: 'aguardando_entregador', status_text: '⏳ Aguardando entregador' });
                renderizarTabs();
            }, 12000);
            
            renderizarTabs();
            return true;
        }
        return false;
    }

    async function aceitarEntrega(pedidoId) {
        const result = await callAPI('aceitar_entrega', { pedido_id: pedidoId, entregador_id: currentUser.id });
        if (result.success) {
            alert("Entrega aceita!");
            renderizarTabs();
        }
    }

    async function confirmarEntrega(pedidoId) {
        const result = await callAPI('confirmar_entrega', { pedido_id: pedidoId, entregador_id: currentUser.id });
        if (result.success) {
            alert("Entrega confirmada!");
            renderizarTabs();
        }
    }

    async function enviarMensagem(destinatarioId, destinatarioNome, destinatarioTipo, mensagem) {
        await callAPI('enviar_mensagem', {
            remetente_id: currentUser.id,
            remetente_tipo: currentUser.role,
            destinatario_id: destinatarioId,
            destinatario_tipo: destinatarioTipo,
            mensagem
        });
    }

    async function carregarMensagens(contatoId, contatoTipo) {
        return await callAPIGet('listar_mensagens', {
            usuario_id: currentUser.id,
            usuario_tipo: currentUser.role,
            contato_id: contatoId,
            contato_tipo: contatoTipo
        });
    }

    async function avaliarPedido(pedidoId, nota, comentario) {
        const result = await callAPI('avaliar_pedido', { pedido_id: pedidoId, nota, comentario });
        if (result.success) {
            alert("Avaliação enviada! Obrigado!");
            renderizarTabs();
        }
    }

    // ==================== RENDERIZAÇÃO ====================
    function renderizarCardapio(container) {
        const restaurante = document.getElementById("novoRestaurante")?.value || "McDonald's";
        const itens = cardapio[restaurante] || cardapio["McDonald's"];
        container.innerHTML = `<div class="cardapio-grid">${itens.map(item => `<div class="cardapio-item" onclick="selecionarItem('${item.nome}', ${item.preco})"><div class="cardapio-img">${item.icone}</div><div class="cardapio-info"><h4>${item.nome}</h4><p style="font-size:12px; color:#64748b;">${item.descricao}</p><div class="cardapio-preco">R$ ${item.preco.toFixed(2)}</div><p style="font-size:11px;">⏱️ ${item.tempo} min</p></div></div>`).join('')}</div>`;
    }

    window.selecionarItem = function(nome, preco) {
        document.getElementById("novoProduto").value = nome;
        document.getElementById("produtoPreco").value = preco;
        alert(`"${nome}" selecionado! R$ ${preco.toFixed(2)}`);
    };

    async function renderizarPedidosCliente(container) {
        const pedidos = await callAPIGet('listar_pedidos', { cliente_id: currentUser.id });
        container.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>📦 Meus Pedidos</h3></div>
            <div class="pedidos-grid">${pedidos.length === 0 ? '<p>Nenhum pedido.</p>' : pedidos.map(p => `
                <div class="pedido-card">
                    <div style="display:flex; justify-content:space-between;"><strong>#${p.id} - ${p.restaurante}</strong><span class="status-badge">${p.status_text}</span></div>
                    <div>${p.produto} x${p.quantidade} | R$ ${parseFloat(p.valor).toFixed(2)}</div>
                    <div>📍 ${p.endereco}</div>
                    ${p.entregador_nome ? `<div>🛵 Entregador: ${p.entregador_nome}</div>` : ''}
                    ${p.status === "entregue" && !p.avaliacao ? `<button class="login-btn" style="margin-top:10px; background:#10b981; padding:8px;" onclick="abrirAvaliacao(${p.id})">⭐ Avaliar</button>` : ''}
                    ${p.avaliacao ? `<div><i class="fas fa-star" style="color:#fbbf24;"></i> ${p.avaliacao} estrelas<br><small>${p.comentario || ''}</small></div>` : ''}
                </div>`).join('')}</div>`;
    }

    function renderizarNovoPedido(container) {
        container.innerHTML = `
            <div class="form-modern">
                <h3>🛵 Fazer Novo Pedido</h3>
                <select id="novoRestaurante" onchange="atualizarCardapio()">
                    <option value="McDonald's">🍔 McDonald's</option><option value="Burger King">👑 Burger King</option>
                    <option value="Pizza Hut">🍕 Pizza Hut</option><option value="Habib's">🥙 Habib's</option><option value="Gendai">🍣 Gendai</option>
                </select>
                <div id="cardapioContainer"></div>
                <input type="text" id="novoProduto" placeholder="Produto selecionado" readonly>
                <input type="hidden" id="produtoPreco" value="0">
                <input type="number" id="novoQuantidade" value="1" min="1">
                <select id="novoPagamento"><option value="cartao">💳 Cartão</option><option value="pix">📱 PIX</option><option value="dinheiro">💵 Dinheiro</option></select>
                <input type="text" id="novoEndereco" placeholder="Endereço" value="Av. Paulista, 1000">
                <button class="login-btn" onclick="executarNovoPedido()">Finalizar Pedido</button>
            </div>`;
        atualizarCardapio();
    }

    window.atualizarCardapio = function() { renderizarCardapio(document.getElementById("cardapioContainer")); };
    
    window.executarNovoPedido = async function() {
        const produto = document.getElementById("novoProduto").value;
        const preco = parseFloat(document.getElementById("produtoPreco").value);
        if (!produto) { alert("Selecione um produto do cardápio!"); return; }
        await criarPedido(produto, parseInt(document.getElementById("novoQuantidade").value), 
            document.getElementById("novoRestaurante").value, document.getElementById("novoPagamento").value,
            document.getElementById("novoEndereco").value, preco);
        document.getElementById("novoProduto").value = "";
        renderizarTabs();
    };

    async function renderizarEntregas(container) {
        const pedidos = await callAPIGet('listar_pedidos');
        const disponiveis = pedidos.filter(p => p.status === "aguardando_entregador");
        const minhas = pedidos.filter(p => p.entregador_id == currentUser.id && p.status !== "entregue");
        
        container.innerHTML = `
            <div class="pedidos-grid">
                <h3>🆕 Pedidos Disponíveis</h3>
                ${disponiveis.map(p => `<div class="pedido-card"><strong>#${p.id} - ${p.restaurante}</strong><div>👤 ${p.cliente_nome}</div><div>${p.produto} | ${p.endereco}</div><div>💰 R$ ${parseFloat(p.valor).toFixed(2)}</div><button class="login-btn" style="margin-top:10px; background:#10b981;" onclick="executarAceitarEntrega(${p.id})">✅ Aceitar Entrega</button></div>`).join('')}
                <h3>🚚 Minhas Entregas</h3>
                ${minhas.map(p => `<div class="pedido-card"><strong>#${p.id}</strong><div>👤 ${p.cliente_nome}</div><div>📍 ${p.endereco}</div>${p.status === "em_entrega" ? `<button class="login-btn" style="margin-top:10px; background:#3b82f6;" onclick="executarConfirmarEntrega(${p.id})">📦 Confirmar Entrega</button>` : ''}</div>`).join('')}
            </div>`;
    }

    async function renderizarChatCliente(container) {
        const entregadores = await callAPIGet('listar_entregadores');
        container.innerHTML = `<h3>💬 Conversas</h3><div class="contact-list">${entregadores.map(e => `<div class="contact-item" onclick="abrirChatModal('Chat com ${e.nome}', ${e.id}, '${e.nome}', 'entregador')"><i class="fas fa-motorcycle"></i> ${e.nome} (Entregador)</div>`).join('')}<div class="contact-item" onclick="abrirChatModal('Chat com Admin', 99, 'Admin', 'admin')"><i class="fas fa-shield-alt"></i> Administrador</div></div>`;
    }

    async function renderizarChatEntregador(container) {
        const clientes = await callAPIGet('listar_clientes');
        container.innerHTML = `<h3>💬 Conversas</h3><div class="contact-list">${clientes.map(c => `<div class="contact-item" onclick="abrirChatModal('Chat com ${c.nome}', ${c.id}, '${c.nome}', 'cliente')"><i class="fas fa-user"></i> ${c.nome} (Cliente)</div>`).join('')}<div class="contact-item" onclick="abrirChatModal('Chat com Admin', 99, 'Admin', 'admin')"><i class="fas fa-shield-alt"></i> Administrador</div></div>`;
    }

    async function renderizarAdminPedidos(container) {
        const pedidos = await callAPIGet('listar_pedidos');
        container.innerHTML = `<div class="pedidos-grid"><h3>📋 Todos os Pedidos</h3>${pedidos.map(p => `<div class="pedido-card"><strong>#${p.id}</strong> - ${p.cliente_nome}<br>${p.restaurante} - ${p.produto}<br>Status: ${p.status_text}</div>`).join('')}</div>`;
    }

    async function renderizarAdminChats(container) {
        const clientes = await callAPIGet('listar_clientes');
        const entregadores = await callAPIGet('listar_entregadores');
        container.innerHTML = `<h3>💬 Conversas com Clientes e Entregadores</h3><div class="contact-list">${clientes.map(c => `<div class="contact-item" onclick="abrirChatModal('Chat com ${c.nome}', ${c.id}, '${c.nome}', 'cliente')"><i class="fas fa-user"></i> ${c.nome} (Cliente)</div>`).join('')}${entregadores.map(e => `<div class="contact-item" onclick="abrirChatModal('Chat com ${e.nome}', ${e.id}, '${e.nome}', 'entregador')"><i class="fas fa-motorcycle"></i> ${e.nome} (Entregador)</div>`).join('')}</div>`;
    }

    // Chat Modal
    async function abrirChatModal(titulo, destinatarioId, destinatarioNome, destinatarioRole) {
        closeModal();
        const modal = document.createElement("div"); modal.className = "modal-overlay";
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        modal.innerHTML = `<div class="modal-content"><div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>💬 ${titulo}</h3><button onclick="closeModal()" style="background:#ef4444; border:none; width:35px; height:35px; border-radius:50%; cursor:pointer;">✕</button></div><div id="chatModalContainer"></div></div>`;
        document.body.appendChild(modal); activeModal = modal;
        
        const container = document.getElementById("chatModalContainer");
        const mensagens = await carregarMensagens(destinatarioId, destinatarioRole);
        
        container.innerHTML = `<div class="chat-container" id="chatMsgsModal">${mensagens.map(m => `<div class="chat-message ${m.remetente_id == currentUser.id ? 'sent' : 'received'}"><strong>${m.remetente_nome || (m.remetente_id == currentUser.id ? currentUser.nome : destinatarioNome)}:</strong> ${m.mensagem}<br><small>${m.data_envio}</small></div>`).join('')}</div>
            <div class="chat-input"><input type="text" id="chatInputModal" placeholder="Digite sua mensagem..."><button class="login-btn" style="width:auto;" onclick="enviarMsgModal(${destinatarioId}, '${destinatarioNome}', '${destinatarioRole}')">Enviar</button></div>`;
        
        setTimeout(() => { const div = document.getElementById("chatMsgsModal"); if(div) div.scrollTop = div.scrollHeight; }, 100);
        
        window.enviarMsgModal = async (id, nome, role) => {
            const msg = document.getElementById("chatInputModal").value;
            if(msg) {
                await enviarMensagem(id, nome, role, msg);
                await abrirChatModal(titulo, id, nome, role);
            }
        };
    }

    window.abrirAvaliacao = function(pedidoId) {
        const modal = document.createElement("div"); modal.className = "modal-overlay";
        modal.innerHTML = `<div class="modal-content"><h3>⭐ Avaliar Entrega</h3><div class="avaliacao-stars" id="stars">${[1,2,3,4,5].map(i => `<i class="fas fa-star star" data-nota="${i}"></i>`).join('')}</div><textarea id="comentario" rows="3" placeholder="Deixe seu comentário..."></textarea><button class="login-btn" style="margin-top:15px;" onclick="enviarAvaliacaoFinal(${pedidoId})">Enviar</button></div>`;
        document.body.appendChild(modal);
        let nota = 0;
        document.querySelectorAll(".star").forEach(s => s.onclick = function() { nota = parseInt(this.dataset.nota); document.querySelectorAll(".star").forEach(star => star.classList.toggle("active", parseInt(star.dataset.nota) <= nota)); });
        window.enviarAvaliacaoFinal = function() { if(nota) { avaliarPedido(pedidoId, nota, document.getElementById("comentario").value); modal.remove(); } else alert("Selecione uma nota!"); };
    };

    window.executarAceitarEntrega = async (id) => { await aceitarEntrega(id); renderizarTabs(); };
    window.executarConfirmarEntrega = async (id) => { await confirmarEntrega(id); renderizarTabs(); };
    window.closeModal = function() { if(activeModal) { activeModal.remove(); activeModal = null; } };

    function renderizarTabs() {
        const navTabs = document.getElementById("navTabs"), tabContainer = document.getElementById("tabContainer");
        let tabs = [];
        if (currentUser.role === "cliente") {
            tabs = [
                { id: "pedidos", nome: "📦 Pedidos", render: renderizarPedidosCliente },
                { id: "novo", nome: "🛒 Pedir", render: renderizarNovoPedido },
                { id: "chat", nome: "💬 Chat", render: renderizarChatCliente }
            ];
        } else if (currentUser.role === "entregador") {
            tabs = [
                { id: "entregas", nome: "🚚 Entregas", render: renderizarEntregas },
                { id: "chat", nome: "💬 Chat", render: renderizarChatEntregador }
            ];
        } else {
            tabs = [
                { id: "pedidos", nome: "📋 Pedidos", render: renderizarAdminPedidos },
                { id: "chats", nome: "💬 Chats", render: renderizarAdminChats }
            ];
        }
        
        navTabs.innerHTML = ""; tabContainer.innerHTML = "";
        tabs.forEach((tab, idx) => {
            const btn = document.createElement("button"); btn.className = `tab-btn ${idx === 0 ? "active" : ""}`; btn.innerHTML = tab.nome;
            btn.onclick = () => { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active")); document.getElementById(`tab-${tab.id}`).classList.add("active"); };
            navTabs.appendChild(btn);
            const div = document.createElement("div"); div.id = `tab-${tab.id}`; div.className = `tab-content ${idx === 0 ? "active" : ""}`; tabContainer.appendChild(div);
            tab.render(div);
        });
    }

    function logout() { if(trackingInterval) clearInterval(trackingInterval); closeModal(); currentUser = null; document.getElementById("loginScreen").style.display = "flex"; document.getElementById("dashboardMain").style.display = "none"; }

    document.querySelectorAll(".role-btn").forEach(btn => btn.addEventListener("click", function() {
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active")); this.classList.add("active");
        if (!isLoginMode) document.getElementById("regVeiculo").style.display = this.dataset.role === "entregador" ? "block" : "none";
    }));
</script>
</body>
</html>
